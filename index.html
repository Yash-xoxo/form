<!DOCTYPE html>
<html>
<head>
<title>Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
:root {
  --bg-1: #fff8ed;
  --bg-2: #fbe6cf;
  --card: #ffffff;
  --text: #2b1f14;
  --muted: #705947;
  --accent: #d86d2a;
  --accent-dark: #b5561c;
  --ring: #f7c8a7;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 10% 15%, #ffd8ba 0, transparent 36%),
    radial-gradient(circle at 90% 85%, #f3c0a0 0, transparent 34%),
    linear-gradient(135deg, var(--bg-1), var(--bg-2));
}

.card {
  width: min(92vw, 430px);
  background: var(--card);
  border-radius: 20px;
  padding: 30px 24px 24px;
  box-shadow: 0 16px 40px rgba(108, 68, 38, 0.16);
  border: 1px solid #f3d9c6;
  animation: rise .45s ease;
}

h2 {
  margin: 0 0 8px;
  font-size: 1.8rem;
  letter-spacing: 0.2px;
}

p {
  margin: 0 0 20px;
  color: var(--muted);
  font-size: 0.95rem;
}

label {
  display: block;
  margin-bottom: 8px;
  font-size: 0.88rem;
  font-weight: 700;
  color: #5a3f2c;
}

input {
  width: 100%;
  border: 1px solid #e7cdb8;
  background: #fffdfb;
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 14px;
  font: inherit;
  color: var(--text);
  transition: border-color .2s ease, box-shadow .2s ease, transform .12s ease;
}

input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--ring);
  transform: translateY(-1px);
}

button {
  width: 100%;
  border: 0;
  border-radius: 12px;
  padding: 12px 14px;
  font: inherit;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(120deg, var(--accent), #f08b45);
  cursor: pointer;
  transition: transform .14s ease, box-shadow .2s ease, background .2s ease;
  box-shadow: 0 10px 18px rgba(216, 109, 42, 0.28);
}

button:hover {
  transform: translateY(-1px);
}

button:active {
  transform: translateY(0);
}

button:disabled {
  cursor: not-allowed;
  background: #d0b09b;
  box-shadow: none;
}

.status {
  min-height: 1.25rem;
  margin-top: 12px;
  font-size: 0.9rem;
  color: var(--muted);
}

@keyframes rise {
  from {
    opacity: 0;
    transform: translateY(12px) scale(0.98);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}
</style>
</head>

<body>

<main class="card">
<h2>User Form</h2>
<p>Add your details and store them securely.</p>

<form id="form">
<label for="name">Name</label>
<input type="text" id="name" placeholder="Enter your full name" required>

<label for="email">Email</label>
<input type="email" id="email" placeholder="you@example.com" required>

<button id="submitBtn" type="submit">Submit</button>
<div id="status" class="status"></div>
</form>
</main>

<script>

document.getElementById("form").addEventListener("submit", async (e)=>{

e.preventDefault()

const name=document.getElementById("name").value
const email=document.getElementById("email").value
const submitBtn = document.getElementById("submitBtn")
const status = document.getElementById("status")

submitBtn.disabled = true
submitBtn.textContent = "Submitting..."
status.textContent = "Sending..."

try {
const response = await fetch("https://form-mp7o.onrender.com/submit",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({name,email})
})

if (!response.ok) {
const errorData = await response.json().catch(() => ({}))
status.textContent = "Store failed: " + (errorData.error || "Unknown error")
submitBtn.disabled = false
submitBtn.textContent = "Submit"
return
}

status.textContent = "Data stored successfully."
document.getElementById("form").reset()
} catch (err) {
status.textContent = "Store failed: network/server error"
} finally {
submitBtn.disabled = false
submitBtn.textContent = "Submit"
}

})

</script>

</body>
</html>
